<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطب ومواعظ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');

        :root {
            --primary: #1b4d3e;
            --primary-light: #256b57;
            --secondary: #c5a880;
            --bg: #f4f6f5;
            --card-bg: #ffffff;
            --text: #333333;
            --text-muted: #777777;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
        }

        /* تصغير البار العلوي وتعديل النص */
        header {
            background: linear-gradient(135deg, var(--primary), #0f3025);
            color: white;
            text-align: center;
            padding: 15px 10px; /* بار نحيف واحترافي */
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-bottom: 2px solid var(--secondary);
        }

        header h1 { 
            font-size: 1.3rem; 
            font-weight: 700;
        }

        /* الحاوية الرئيسية ممتدة بالكامل بدون مساحات جانبية ضائعة */
        .container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: 0; /* بدون padding في الأطراف */
        }

        /* قسم التحكم (البحث والقائمة المنسدلة) */
        .controls-section {
            background: var(--card-bg);
            padding: 12px 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #eaeaea;
        }

        .search-box {
            flex: 2;
            padding: 10px 15px;
            border: 1px solid #ccd1d1;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        /* القائمة المنسدلة بدلاً من الأزرار المتناثرة */
        .filter-select {
            flex: 1;
            padding: 10px 10px;
            border: 1px solid #ccd1d1;
            border-radius: 8px;
            font-size: 0.9rem;
            background-color: white;
            outline: none;
            color: var(--text);
            cursor: pointer;
        }

        /* شبكة الكروت على الخلفية مباشرة وبدون مسافات أفقية مبالغ فيها */
        .lectures-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100%, 1fr));
            gap: 15px;
            padding: 15px; /* مسافة بسيطة بين الكروت نفسها */
        }

        @media (min-width: 480px) {
            .lectures-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
        }

        /* كارت الفيديو مدمج وأنيق */
        .video-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            border: 1px solid #eaeaea;
            position: relative;
        }

        .thumb-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }

        .thumb-container img {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            object-fit: cover;
        }

        /* زر المفضلة (القلب) فوق الكارت بشكل احترافي */
        .fav-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 1.2rem;
            color: #ccc;
            transition: color 0.2s, transform 0.2s;
            z-index: 5;
        }
        .fav-btn.is-fav {
            color: #e62117;
        }

        .card-details {
            padding: 15px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .speaker-badge {
            display: inline-block;
            font-size: 0.8rem;
            color: var(--primary);
            background: #edf5f2;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .watch-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        /* ==================== صفحة العرض الداخلية الكاملة Edge-to-Edge ==================== */
        .details-page {
            display: none;
            background: var(--bg); /* على الخلفية مباشرة */
            width: 100%;
            min-height: 100vh;
        }

        /* المشغل في الأعلى ممتد 100% وبحجم كبير ممتاز للرؤية */
        .inner-player-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* أبعاد 16:9 ممتدة بالكامل للأطراف */
            background: #000;
        }

        .inner-player-container iframe {
            position: absolute;
            top:0; left:0; width:100%; height:100%; border:0;
        }

        /* زر عودة دائري صغير وأنيق يطفو فوق الفيديو */
        .back-btn-small {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            z-index: 10;
            transition: background 0.2s;
        }
        .back-btn-small:hover { background: rgba(0, 0, 0, 0.8); }

        /* تفاصيل الفيديو بالأسفل منسقة على الخلفية بدون صناديق محجمة */
        .inner-content {
            padding: 15px;
        }

        .inner-title {
            font-size: 1.2rem;
            color: #111;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .inner-speaker {
            display: inline-block;
            font-size: 0.85rem;
            color: var(--secondary);
            font-weight: 700;
            margin-bottom: 15px;
        }

        .youtube-redirect-btn {
            display: block;
            text-align: center;
            background: #e62117;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            margin-bottom: 20px;
            font-size: 0.95rem;
            box-shadow: 0 2px 6px rgba(230,33,23,0.2);
        }

        .summary-box {
            line-height: 1.6;
            font-size: 0.95rem;
            color: #444;
        }

        .summary-box h4 { 
            margin-bottom: 6px; 
            color: var(--primary);
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>خطب ومواعظ</h1>
    </header>

    <div class="container">
        
        <div id="main-view">
            <div class="controls-section">
                <input type="text" id="search-input" class="search-box" placeholder="ابحث عن خطبة أو شيخ...">
                
                <select id="filter-select" class="filter-select" onchange="handleFilterChange()">
                    <option value="all">كل الشيوخ</option>
                    <option value="favorites">❤️ المفضلة</option>
                    <option value="الشيخ سمير مصطفى">الشيخ سمير مصطفى</option>
                    <option value="الشيخ محمد راتب النابلسي">الشيخ النابلسي</option>
                    <option value="الشيخ محمد متولي الشعراوي">الشيخ الشعراوي</option>
                </select>
            </div>

            <div class="lectures-grid" id="grid-container">
                </div>
        </div>

        <div id="details-view" class="details-page">
            <div class="inner-player-container">
                <button class="back-btn-small" onclick="showMainView()">✕</button>
                <iframe id="main-player" src="" allowfullscreen></iframe>
            </div>
            
            <div class="inner-content">
                <h2 id="inner-title" class="inner-title"></h2>
                <span id="inner-speaker" class="inner-speaker"></span>
                
                <a id="youtube-link" href="#" target="_blank" class="youtube-redirect-btn">فتح الفيديو في يوتيوب 📱</a>
                
                <div class="summary-box">
                    <h4>ملخص الموعظة:</h4>
                    <p id="inner-summary"></p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // مصفوفة البيانات مع إضافة حقل معرف فريد لتسهيل الحفظ بالمفضلة
        const data = [
            {
                id: "LxSwWwBCuHY",
                title: "أرهقتني الذنوب أتوب وأعود، فما هو الحل؟",
                speaker: "الشيخ سمير مصطفى",
                summary: "تتناول هذه الموعظة مشكلة تكرار الذنوب بعد التوبة والشعور باليأس والإرهاق النفسي. يوجه الشيخ نصيحة قائمة على مفهوم الافتقار والعبودية الكاملة لله، وضرورة مداومة الاستغفار والإكثار من الحسنات الماحية والوضوء لتطهير الفطرة والقلب."
            },
            {
                id: "S_8N-S88yT0",
                title: "كيف تتعامل مع البلاء والابتلاء في الحياة؟",
                speaker: "الشيخ محمد راتب النابلسي",
                summary: "يشرح الشيخ في هذا الدرس الفارق بين الابتلاء كعقوبة والابتلاء كترقية للمؤمن، موضحاً القواعد القرآنية لطمأنينة النفس ورؤية الحكمة الإلهية الكامنة وراء كل شدة ومحنة يمر بها الإنسان في دنياه."
            },
            {
                id: "tyFqgE7p2_c",
                title: "أجمل خطبة عن الصبر وجبر الخواطر",
                speaker: "الشيخ محمد متولي الشعراوي",
                summary: "خواطر إيمانية لفضيلة الشيخ الشعراوي حول عظمة الصبر، وكيف يجازي الله الصابرين بجبر من عنده يفوق توقعاتهم، مع الاستدلال بآيات القرآن الكريم وقصص الأنبياء في مواجهة الشدائد."
            },
            {
                id: "g7R0PAt7eIs",
                title: "مفاتيح الرزق والبركة في البيوت والمال",
                speaker: "الشيخ محمد راتب النابلسي",
                summary: "يتحدث الشيخ عن الأسباب الشرعية لجلب الرزق وتوسيع البركة في المنازل، ومنها صلة الرحم، الاستغفار، وتقوى الله في البيوع والمعاملات اليومية."
            },
            {
                id: "XG-pGst1jX4",
                title: "تفسير خواطر سورة الفاتحة وأسرارها العميقة",
                speaker: "الشيخ محمد متولي الشعراوي",
                summary: "تفسير رائع يبحر في معاني أم الكتاب (سورة الفاتحة)، مبيناً أسرار الشفاء والاتصال المباشر بين العبد وربه أثناء الصلاة وقيمة التدبر فيها."
            }
        ];

        // مصفوفة لتخزين معرفات الفيديوهات المفضلة (تعتمد على التخزين المحلي للمتصفح LocalStorage للحفاظ عليها حتى بعد غلق التطبيق)
        let favorites = JSON.parse(localStorage.getItem('fav_lectures')) || [];

        function renderCards() {
            const grid = document.getElementById('grid-container');
            const searchTxt = document.getElementById('search-input').value.toLowerCase();
            const filterValue = document.getElementById('filter-select').value;
            grid.innerHTML = '';

            data.forEach(item => {
                const matchSearch = item.title.toLowerCase().includes(searchTxt) || item.speaker.toLowerCase().includes(searchTxt);
                
                let matchFilter = false;
                if (filterValue === 'all') matchFilter = true;
                else if (filterValue === 'favorites') matchFilter = favorites.includes(item.id);
                else matchFilter = (item.speaker === filterValue);

                if (matchSearch && matchFilter) {
                    const thumbUrl = `https://img.youtube.com/vi/${item.id}/mqdefault.jpg`;
                    const isFav = favorites.includes(item.id) ? 'is-fav' : '';
                    const favIcon = favorites.includes(item.id) ? '❤️' : '🤍';
                    
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <button class="fav-btn ${isFav}" onclick="toggleFavorite('${item.id}', event)">${favIcon}</button>
                        <div class="thumb-container">
                            <img src="${thumbUrl}" alt="${item.title}">
                        </div>
                        <div class="card-details">
                            <h3 class="card-title">${item.title}</h3>
                            <span class="speaker-badge">${item.speaker}</span>
                            <button class="watch-btn" onclick="openVideo('${item.id}')">مشاهدة الموعظة</button>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        // إضافة أو حذف الفيديو من المفضلة وحفظه في ذاكرة الهاتف
        function toggleFavorite(id, event) {
            event.stopPropagation(); // منع فتح الفيديو عند الضغط على القلب
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('fav_lectures', JSON.stringify(favorites));
            renderCards();
        }

        function handleFilterChange() {
            renderCards();
        }

        function openVideo(id) {
            const item = data.find(x => x.id === id);
            if (!item) return;

            document.getElementById('main-player').src = `https://www.youtube.com/embed/${item.id}`;
            document.getElementById('inner-title').innerText = item.title;
            document.getElementById('inner-speaker').innerText = item.speaker;
            document.getElementById('inner-summary').innerText = item.summary;
            document.getElementById('youtube-link').href = `https://youtu.be/${item.id}`;

            document.getElementById('main-header').style.display = 'none'; // إخفاء بار العناوين في صفحة المشاهدة
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function showMainView() {
            document.getElementById('main-player').src = ''; 
            document.getElementById('details-view').style.display = 'none';
            document.getElementById('main-header').style.display = 'block';
            document.getElementById('main-view').style.display = 'block';
        }

        document.getElementById('search-input').addEventListener('input', renderCards);

        // التشغيل الأولي
        renderCards();
    </script>
</body>
    </html>
